<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extrator de Entregas</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      padding: 24px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .muted {
      color: #9ca3af;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #cbd5e1;
    }
    input, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #4b5563;
      padding: 11px 12px;
      font-size: 14px;
    }
    input {
      background: #1f2937;
      color: #fff;
    }
    input[type="file"] {
      padding: 9px;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .actions button {
      width: auto;
      min-width: 180px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      color: #fff;
    }
    .primary { background: #7c3aed; }
    .secondary { background: #2563eb; }
    .ghost { background: #374151; }
    .actions button:hover { opacity: 0.92; }
    #log {
      white-space: pre-line;
      line-height: 1.65;
      font-size: 13px;
    }
    .stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .stat {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 180px;
    }
    .stat strong {
      display: block;
      font-size: 20px;
      margin-top: 4px;
    }
    .table-wrap {
      overflow: auto;
      max-height: 520px;
      margin-top: 16px;
      border: 1px solid #374151;
      border-radius: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: #111827;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid #374151;
      text-align: left;
      white-space: nowrap;
    }
    th {
      background: #1f2937;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .files-list {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .file-item {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Extrator de Entregas</h1>
      <div class="muted">Suba 2 ou mais arquivos de tracking, filtre por período e gere a base pronta em um único HTML.</div>
    </div>

    <div class="card">
      <div class="grid">
        <div>
          <label for="loja">Loja</label>
          <input id="loja" type="text" placeholder="Digite a loja manualmente" />
        </div>
        <div>
          <label for="canal">Canal</label>
          <input id="canal" type="text" value="B2C" />
        </div>
        <div>
          <label for="dtInicio">Data inicial</label>
          <input id="dtInicio" type="date" />
        </div>
        <div>
          <label for="dtFim">Data final</label>
          <input id="dtFim" type="date" />
        </div>
      </div>

      <div style="margin-top: 12px;">
        <label for="arquivos">Arquivos de tracking (.csv, .xlsx, .xls)</label>
        <input id="arquivos" type="file" accept=".csv,.xlsx,.xls" multiple />
      </div>

      <div class="actions">
        <button class="primary" onclick="processarArquivos()">Gerar base</button>
        <button class="secondary" onclick="baixarExcel()">Baixar .xlsx</button>
        <button class="ghost" onclick="baixarCSV()">Baixar .csv</button>
      </div>

      <div id="filesList" class="files-list"></div>
    </div>

    <div class="card">
      <div><strong>Resumo</strong></div>
      <div class="stats">
        <div class="stat"><span class="muted">Linhas lidas</span><strong id="statLidas">0</strong></div>
        <div class="stat"><span class="muted">Linhas filtradas</span><strong id="statFiltradas">0</strong></div>
        <div class="stat"><span class="muted">Registros finais</span><strong id="statFinais">0</strong></div>
      </div>
    </div>

    <div class="card">
      <div><strong>Log</strong></div>
      <div id="log" class="muted"></div>
    </div>

    <div class="card">
      <div><strong>Prévia da base</strong> <span id="contador" class="muted"></span></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nome do Cliente</th>
              <th>E-mail</th>
              <th>Ordem ERP</th>
              <th>Data de Envio</th>
              <th>Transportadora</th>
              <th>CD de Origem</th>
              <th>CPF</th>
              <th>Data Entrega</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let resultadoFinal = [];

    function log(msg) {
      const el = document.getElementById('log');
      el.textContent += '• ' + msg + '\n';
    }

    function limparLog() {
      document.getElementById('log').textContent = '';
    }

    function hojeBR() {
      const d = new Date();
      return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
    }

    function hojeISO() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function setDatasPadrao() {
      const hoje = new Date();
      const inicio = new Date();
      inicio.setDate(hoje.getDate() - 1);
      document.getElementById('dtFim').value = hojeISO();
      document.getElementById('dtInicio').value = `${inicio.getFullYear()}-${String(inicio.getMonth() + 1).padStart(2, '0')}-${String(inicio.getDate()).padStart(2, '0')}`;
    }

    function parseDate(val) {
      if (!val) return null;
      if (val instanceof Date && !isNaN(val)) return val;

      const s = String(val).trim();
      const br = s.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
      if (br) {
        const d = new Date(`${br[3]}-${br[2]}-${br[1]}T00:00:00`);
        return isNaN(d) ? null : d;
      }

      const iso = new Date(s);
      return isNaN(iso) ? null : iso;
    }

    function formatarDataBR(val) {
      const d = parseDate(val);
      if (!d) return '';
      return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
    }

    function normalizarTexto(v) {
      return String(v || '').trim().toLowerCase();
    }

    function somenteDigitos(v) {
      return String(v || '').replace(/\D/g, '');
    }

    function gerarCpfPorERP(erp) {
      const base = somenteDigitos(erp || '0') || '0';
      let seed = 0;
      for (let i = 0; i < base.length; i++) {
        seed = (seed * 31 + Number(base[i])) % 1000000007;
      }

      function rand() {
        seed = (seed * 1664525 + 1013904223) % 4294967296;
        return seed / 4294967296;
      }

      const nums = [];
      for (let i = 0; i < 9; i++) nums.push(Math.floor(rand() * 10));

      let soma1 = 0;
      for (let i = 0; i < 9; i++) soma1 += nums[i] * (10 - i);
      let dv1 = 11 - (soma1 % 11);
      if (dv1 >= 10) dv1 = 0;

      let soma2 = 0;
      for (let i = 0; i < 9; i++) soma2 += nums[i] * (11 - i);
      soma2 += dv1 * 2;
      let dv2 = 11 - (soma2 % 11);
      if (dv2 >= 10) dv2 = 0;

      const cpf = [...nums, dv1, dv2].join('');
      return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
    }

    function detectarSeparador(texto) {
      const primeiraLinha = (texto.split(/\r?\n/)[0] || '');
      return primeiraLinha.split(';').length > primeiraLinha.split(',').length ? ';' : ',';
    }

    function parseCSVLine(line, sep) {
      const out = [];
      let cur = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') {
            cur += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === sep && !inQuotes) {
          out.push(cur);
          cur = '';
        } else {
          cur += ch;
        }
      }
      out.push(cur);
      return out;
    }

    function lerCSV(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
          try {
            const buffer = e.target.result;
            let texto;
            try {
              texto = new TextDecoder('utf-8', { fatal: true }).decode(buffer);
            } catch (_) {
              texto = new TextDecoder('windows-1252').decode(buffer);
            }

            const sep = detectarSeparador(texto);
            const linhas = texto.split(/\r?\n/).filter(l => l.trim() !== '');
            if (linhas.length < 2) return resolve([]);

            const headers = parseCSVLine(linhas[0], sep).map(h => h.trim().replace(/^"|"$/g, ''));
            const dados = [];
            for (let i = 1; i < linhas.length; i++) {
              const cols = parseCSVLine(linhas[i], sep);
              const row = {};
              headers.forEach((h, idx) => {
                row[h] = (cols[idx] || '').trim().replace(/^"|"$/g, '');
              });
              dados.push(row);
            }
            resolve(dados);
          } catch (err) {
            reject(err);
          }
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });
    }

    function lerXLSX(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
          try {
            const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
            const sheet = wb.Sheets[wb.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: false });
            resolve(json);
          } catch (err) {
            reject(err);
          }
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });
    }

    async function lerArquivo(file) {
      const nome = file.name.toLowerCase();
      if (nome.endsWith('.csv')) return lerCSV(file);
      return lerXLSX(file);
    }

    function atualizarArquivosNaTela(filesInfo) {
      const el = document.getElementById('filesList');
      if (!filesInfo.length) {
        el.innerHTML = '';
        return;
      }
      el.innerHTML = filesInfo.map(f => `<div class="file-item">${f.nome} — ${f.linhas} linhas</div>`).join('');
    }

    async function processarArquivos() {
      limparLog();
      resultadoFinal = [];
      document.getElementById('tbody').innerHTML = '';
      document.getElementById('contador').textContent = '';
      document.getElementById('statLidas').textContent = '0';
      document.getElementById('statFiltradas').textContent = '0';
      document.getElementById('statFinais').textContent = '0';

      const loja = document.getElementById('loja').value.trim();
      const canal = document.getElementById('canal').value.trim();
      const dtInicio = document.getElementById('dtInicio').value;
      const dtFim = document.getElementById('dtFim').value;
      const files = Array.from(document.getElementById('arquivos').files || []);

      if (!loja) return alert('Preencha a loja.');
      if (!canal) return alert('Preencha o canal.');
      if (!dtInicio || !dtFim) return alert('Preencha o período.');
      if (!files.length) return alert('Adicione ao menos 1 arquivo de tracking.');

      const inicio = new Date(dtInicio + 'T00:00:00');
      const fim = new Date(dtFim + 'T23:59:59');
      if (inicio > fim) return alert('A data inicial não pode ser maior que a final.');

      log(`Iniciando leitura de ${files.length} arquivo(s).`);

      let todasLinhas = [];
      const filesInfo = [];

      for (const file of files) {
        try {
          const linhas = await lerArquivo(file);
          todasLinhas = todasLinhas.concat(linhas);
          filesInfo.push({ nome: file.name, linhas: linhas.length });
          log(`${file.name}: ${linhas.length} linhas lidas.`);
        } catch (err) {
          log(`Erro ao ler ${file.name}.`);
        }
      }

      atualizarArquivosNaTela(filesInfo);
      document.getElementById('statLidas').textContent = String(todasLinhas.length);

      const filtradas = todasLinhas.filter(row => {
        const canalRow = normalizarTexto(row['Canal']);
        const lojaRow = normalizarTexto(row['Loja']);
        const statusRow = normalizarTexto(row['Status Pedido']);
        const situacaoRow = normalizarTexto(row['Situacao']);
        const dataEntrega = parseDate(row['Data Entrega']);

        if (canalRow !== normalizarTexto(canal)) return false;
        if (lojaRow !== normalizarTexto(loja)) return false;
        if (!statusRow.includes('entregue')) return false;
        if (!situacaoRow.includes('finalizada')) return false;
        if (!dataEntrega) return false;
        if (dataEntrega < inicio || dataEntrega > fim) return false;
        return true;
      });

      document.getElementById('statFiltradas').textContent = String(filtradas.length);
      log(`${filtradas.length} linhas passaram no filtro.`);

      const mapa = new Map();
      for (const row of filtradas) {
        const erp = String(row['Pedido ERP'] || '').trim();
        if (!erp) continue;

        const atual = {
          'Nome do Cliente': String(row['Cliente'] || '').trim(),
          'E-mail': String(row['Email de compra'] || '').trim().toLowerCase(),
          'Ordem ERP': erp,
          'Data de Envio': hojeBR(),
          'Transportadora': String(row['Transportadora'] || '').trim(),
          'CD de Origem': String(row['CD de origem'] || '').trim(),
          'CPF': gerarCpfPorERP(erp),
          'Data Entrega': formatarDataBR(row['Data Entrega'])
        };

        mapa.set(erp, atual);
      }

      resultadoFinal = Array.from(mapa.values());
      document.getElementById('statFinais').textContent = String(resultadoFinal.length);
      log(`Base final gerada com ${resultadoFinal.length} registro(s).`);
      renderTabela();
    }

    function renderTabela() {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';

      resultadoFinal.slice(0, 200).forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(r['Nome do Cliente'])}</td>
          <td>${escapeHtml(r['E-mail'])}</td>
          <td>${escapeHtml(r['Ordem ERP'])}</td>
          <td>${escapeHtml(r['Data de Envio'])}</td>
          <td>${escapeHtml(r['Transportadora'])}</td>
          <td>${escapeHtml(r['CD de Origem'])}</td>
          <td>${escapeHtml(r['CPF'])}</td>
          <td>${escapeHtml(r['Data Entrega'])}</td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById('contador').textContent = `(${resultadoFinal.length} registros${resultadoFinal.length > 200 ? ' · exibindo 200' : ''})`;
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function baixarExcel() {
      if (!resultadoFinal.length) return alert('Gere a base antes de baixar.');
      const ws = XLSX.utils.json_to_sheet(resultadoFinal);
      ws['!cols'] = [
        { wch: 28 }, { wch: 32 }, { wch: 16 }, { wch: 14 },
        { wch: 22 }, { wch: 14 }, { wch: 18 }, { wch: 14 }
      ];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Base');
      XLSX.writeFile(wb, `base_entregas_${hojeISO()}.xlsx`);
    }

    function baixarCSV() {
      if (!resultadoFinal.length) return alert('Gere a base antes de baixar.');
      const headers = Object.keys(resultadoFinal[0]);
      const linhas = [headers.join(';')];
      for (const row of resultadoFinal) {
        const vals = headers.map(h => `"${String(row[h] || '').replace(/"/g, '""')}"`);
        linhas.push(vals.join(';'));
      }
      const blob = new Blob(['\ufeff' + linhas.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `base_entregas_${hojeISO()}.csv`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    setDatasPadrao();
  </script>
</body>
</html>
